apiVersion: v1
kind: Service
metadata:
  name: bpp-backend
  namespace: bro-please-pay
  labels:
    app: bpp-backend
    tier: api
spec:
  type: ClusterIP
  selector:
    app: bpp-backend
  ports:
    - name: http
      port: 80
      targetPort: http  # resolves to containerPort named "http" (8000)
      protocol: TCP
---
# HPA — scales pods 2-8 based on CPU utilization
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bpp-backend
  namespace: bro-please-pay
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bpp-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# Namespace (create once)
apiVersion: v1
kind: Namespace
metadata:
  name: bro-please-pay
  labels:
    app: bro-please-pay
