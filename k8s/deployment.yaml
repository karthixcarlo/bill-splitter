apiVersion: apps/v1
kind: Deployment
metadata:
  name: bpp-backend
  namespace: bro-please-pay
  labels:
    app: bpp-backend
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bpp-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: bpp-backend
        tier: api
    spec:
      serviceAccountName: bpp-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: bpp-backend
          image: ghcr.io/your-org/bpp-backend:latest  # replace with your registry
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
              name: http
          env:
            - name: PORT
              value: "8000"
            - name: HOST
              value: "0.0.0.0"
          envFrom:
            - secretRef:
                name: bpp-backend-secrets  # contains SUPABASE_*, GEMINI_API_KEY, FRONTEND_URL, etc.
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Readiness probe — pod only receives traffic when /health returns 200
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Liveness probe — restarts the pod if it becomes unresponsive
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          # Startup probe — gives slow-starting pods time before liveness kicks in
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bpp-backend
  namespace: bro-please-pay
  labels:
    app: bpp-backend
