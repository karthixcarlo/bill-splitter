name: CI — Bro Please Pay

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Vercel and Railway auto-deploy from GitHub directly.
# This pipeline only validates code quality — no deploy steps needed.

jobs:
  # ── Lint & Type-check Frontend ──────────────────────────────────────────────
  frontend-check:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build (type-check + compile)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key
          NEXT_PUBLIC_API_URL: https://placeholder.railway.app

  # ── Lint & Validate Backend ─────────────────────────────────────────────────
  backend-check:
    name: Backend Lint & Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile main.py auth.py rate_limit.py routers/bills.py routers/scan.py routers/aura.py routers/squads.py

      - name: Import check
        run: python -c "from main import app; print('FastAPI app loaded:', len(app.routes), 'routes')"
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          GEMINI_API_KEY: placeholder
          FRONTEND_URL: https://placeholder.vercel.app

  # ── Build Docker Image (validate Dockerfile) ────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: bpp-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
